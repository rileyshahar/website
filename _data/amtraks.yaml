  talks:
    - speaker: "Fangji Liu"
      affiliation: "University of Pennsylvania"
      title: "Homological stability and Quillen's argument"
      abstract: |
        This talk will introduce the ideas of homological stability and highlight
        some important examples. The second part of the talk will focus on
        Quillen's spectral sequence argument for the homological stability of
        symmetric groups.

    - speaker: "Riley Shahar"
      affiliation: "University of Pennsylvania"
      title: "Connectivity of simplicial complexes: A toolbox"
      abstract: |
        This talk will elaborate on the connectivity arguments that were swept
        under the rug during pre-talk 1. In particular, we will focus on tools
        and techniques coming from discrete Morse theory. After introducing the
        basics of discrete Morse theory, we will use it to prove the
        Solomon-Tits Theorem.

    - speaker: "Søren Galatius"
      affiliation: "Columbia University"
      title: "Homological stability for moduli spaces of manifolds"
      abstract: |
        I will discuss an instance of homological stability which is not about
        homology of discrete groups, but whose proof nevertheless is very
        similar to that for the symmetric groups, discussed in section 2 of the
        notes by Kupers mentioned in pre-talk 1.

    - speaker: "Nir Gadish"
      affiliation: "University of Pennsylvania"
      title: "Homological stability from the point of view of cells"
      abstract: |
        Virtually every homological stability argument proceeds by showing that
        some (semi-)simplicial complex is highly connected. Finding the right
        complex to use is somewhat of an art, but they usually follow a certain
        pattern of being the collection of "destabilizations" of an object. But
        where do these complexes come from? And what are they measuring?

        In this talk I will present a recent observation of Randal-Williams,
        that the complexes of destabilizations in fact measure the $$E_2$$-cells
        needed to construct the classifying spaces of the groups in question,
        and thus most examples of homological stability are a consequence of
        stability for the $$E_2$$-operad.

- slug: amtrak-iii
  title: "AMTRaK III"
  topic: "Hermitian K-theory and Motivic Homotopy Theory"
  date: 2025-02-28
  venue: "the University of Virginia"
  intro: >
    The conference was themed around Hermitian K-theory and motivic homotopy
    theory and featured two research talks by [Thomas
    Brazelton](https://tbrazel.github.io), with pretalks by [Albert
    Yang](https://kclo3-naoh.github.io/) and [Ben Spitz](https://benspitz.com/).

