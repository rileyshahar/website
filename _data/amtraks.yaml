  talks:
    - speaker: "Albert Yang"
      affiliation: "University of Pennsylvania"
      title: "Introduction to Motivic Homotopy Theory"
      abstract: |
        This talk will introduce the basic definitions of motivic homotopy
        theory, such as Zariski and Nisnevich descent, along with key examples
        of motivic spaces including Eilenberg–Maclane spaces.

    - speaker: "Ben Spitz"
      affiliation: "University of Virginia"
      title: "Postnikov Towers and Obstruction Theory"
      abstract: |
        This talk will introduce the construction and properties of Postnikov
        towers, the basic ideas of obstruction theory, and connections to
        characteristic classes.

    - speaker: "Thomas Brazelton"
      affiliation: "Harvard University"
      title: "A leisurely introduction to Hermitian K-theory"
      abstract: |
        We will motivate and introduce the basic ideas of Hermitian K-theory,
        highlighting the similarities and differences with algebraic K-theory
        of rings. This will be approached from two perspectives: one being a
        stripped-down low-tech version of the (very high-tech) story of
        Poincare $$\infty$$-categories, and the other being the classical picture
        of the K-theory of exact categories with duality.

        Finally we'll discuss how Hermitian K-theory can be promoted to a
        motivic spectrum, which is used as a crucial tool to access stable and
        unstable motivic homotopy groups of spheres.

    - speaker: "Thomas Brazelton"
      affiliation: "Harvard University"
      title: "Rank two algebraic vector bundles on smooth affine fourfolds"
      abstract: |
        Given a finite CW complex, it is a folklore result in obstruction
        theory that it admits only finitely many isomorphism classes of complex
        vector bundles with some prescribed Chern classes. Given a smooth
        affine variety of finite Krull dimension over a field, we can ask an
        analogous question for algebraic bundles, and the answer is mostly
        unknown.

        However Morel's "affine representability" theorem indicates that these
        sorts of algebraic questions are amenable to techniques from motivic
        obstruction theory. Following work of Mohan Kumar, Murthy and others in
        the 20th century, as well as the contemporary research program of Asok
        and Fasel, we understand that the complexity of these sorts of
        questions are governed by two factors: (1) the 2-cohomological
        dimension of the base field, and (2) the corank (dimension of base
        minus rank of bundle).

        In joint work with Opie and Syed we explore corank two in the first
        interesting setting. We explore to what extent Chow-valued Chern
        classes and Chow-Witt-valued Euler classes uniquely classify algebraic
        vector bundles over smooth affine fourfolds over an algebraically
        closed field.

- slug: amtrak-ii
