  talks:
    - speaker: "Nooria Ahmed"
      affiliation: "Johns Hopkins University"
      title: "Introduction to dualizable categories and continuous K-theory"
      abstract: |
        This talk will review the definition of dualizable categories, and
        explain (but not prove!) the characterization in terms of compactly
        exhaustible objects. We will use this to recall the dualizability of
        $$Shv(X,\mathrm{Sp})$$ and (time permitting) sketch a proof.

    - speaker: "Anish Chedalavada"
      affiliation: "Johns Hopkins University"
      title: "Introduction to rigidity and six functor formalism"
      abstract: |
        In this talk, we will review Verdier duality, construct the six
        operations, and define local rigidity and rigidity in connection with
        Verdier duality.

    - speaker: "Liam Keenan"
      affiliation: "Brown University"
      title: "Dualizable categories and trace methods — a sampler"
      abstract: |
        Algebraic K-theory, topological Hochschild homology (THH), topological
        cyclic homology (TC), and topological restriction homology (TR), are
        all examples of localizing invariants. In this talk, I will sample some
        of the ways Efimov's theory of dualizable categories and the category
        of localizing motives interact with these specific invariants.

        In particular, I will discuss (1) the interaction of algebraic K-theory
        and infinite products of categories (originally studied by
        Kasprowski—Winges) and (2) how to express THH of any dualizable
        category completely algebraically. Time permitting, I will discuss some
        other applications and pose a question or two.

    - speaker: "Marco Volpe"
      affiliation: "Universität Regensburg"
      title: "K-theory of sheaves"
      abstract: |
        Let X be a locally compact Hausdorff space, C a dualizable stable
        $$\infty$$-category, and denote by $$Shv(X, C)$$ the $$\infty$$ category of
        C-valued sheaves on X. In this talk, we explain (in as much detail as
        time permits) how to compute the K-theory of Shv(X, C) in terms of the
        compactly supported cohomology of X with coefficients in the spectrum
        $$K(C)$$.

        The strategy we adopt, which was suggested by Dustin Clausen, consists
        in providing an axiomatic characterization of sheaf cohomology on
        compact Hausdorff spaces. If time permits, we will also outline
        applications to simple homotopy theory and functoriality of
        Becker-Gottlieb transfers.

- slug: amtrak-i
