  talks:
    - speaker: "Albert Yang"
      affiliation: "University of Pennsylvania"
      title: "Introduction to Equivariant Homotopy Theory"
      abstract: |
        In this talk, we will review the definition of the stable and unstable
        categories of genuine G-spectra for a finite group G, using the
        perspective of spectral Mackey functors. We will also define the
        Hill-Hopkins-Ravenel norm on genuine G-spectra and (if time permits)
        the isotropy separation sequence.

    - speaker: "Maxine Calle"
      affiliation: "University of Pennsylvania"
      title: "Parametrized Equivariant Stable Homotopy Theory"
      abstract: |
        In this talk, we will explain how the $$\infty$$-categories of G-spaces and
        G-spectra upgrade to the parametrized $$\infty$$-categorical setting. We will
        define genuine $$C_{p}$$-$$E_\infty$$-operads after Nardin-Shah and discuss how being
        a genuinely G-commutative monoid gives rise to norm maps.

    - speaker: "Andres Mejia"
      affiliation: "University of Pennsylvania"
      title: "G-commutative monoids and sheaves on G-manifolds"
      abstract: |
        In this talk we will explain how one can adapt (semi)-recent
        techniques from parametrized homotopy theory to the setting of sheaves
        on equivariant manifolds. More specifically, one can recover the
        category of spaces via the category of sheaves on manifolds. An
        interesting question is what commutative monoids are in this setting.

        One guess is that it's those that possess a covariant functoriality
        known as a transfer with respect to bundles with compact manifold
        fiber, but in fact we need much less: it suffices to have transfers
        along finite covering maps. Quillen conjectured that this was the case
        and equipped with the tools of Bachmann-Hoyois, the proof of this
        statement is relatively formal. Recent advances in parametrized
        equivariant homotopy theory as well as the properties of equivariant
        sheaves on G-manifolds allows one to assemble these proofs together
        equivariantly. This talk aims to tell this story in a way that makes a
        case for the formalism of parametrized equivariant homotopy theory.

    - speaker: "Lucy Yang"
      affiliation: "Columbia University"
      title: "Normed E∞-rings in genuine equivariant C_{p}-spectra"
      abstract: |
        Genuine equivariant homotopy theory is equipped with a multitude of
        coherently commutative multiplication structures generalizing the
        classical notion of an $$E_\infty$$-algebra. Our work concerns the
        $$C_{p}$$-$$E_\infty$$-algebras of Nardin–Shah with respect to a cyclic group $$C_{p}$$ of prime
        order.

        We show that many of the higher coherences inherent to the definition
        of parametrized algebras collapse; in particular, they may be described
        more simply and conceptually in terms of ordinary $$E_\infty$$-algebras as a
        diagram category which we call normed algebras. Our main result
        provides a relatively straightforward criterion for identifying
        $$C_{p}$$-$$E_\infty$$-algebra structures. We visit some applications of our result
        to real motivic invariants.
